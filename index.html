<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional Account Search System">
    <title>Account Search | Professional Database</title>
    <link rel="stylesheet" href="style.css">
    <!-- Using emoji as icons to avoid external dependencies -->
</head>
<body>
    <div class="container">
        <!-- Gold accent line is handled by CSS ::before -->
        
        <div class="header">
            <div class="logo-icon">💼</div>
            <h1>Account Search System</h1>
            <p class="subtitle">Search your database by name, code, or amount</p>
        </div>
        
        <div class="search-box">
            <div class="input-wrapper">
                <span class="search-icon">🔍</span>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Enter name, CH code, or amount..."
                    autocomplete="off"
                    aria-label="Search term"
                />
            </div>
            <button onclick="performSearch()" id="searchBtn" aria-label="Search">
                Search
            </button>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner-container">
                <div class="spinner"></div>
                <p class="spinner-text">Searching database...</p>
            </div>
        </div>
        
        <div id="result"></div>
        
        <div class="footer">
            <div class="footer-content">
                <span class="footer-icon">💡</span>
                <span>Tip: You can search using any field - name, code, or amount</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
