<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SBC CH Code Checker — Field Visit Database">
    <title><CheckMyCH | Field Visit Database</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ambient ambient-1"></div>
    <div class="ambient ambient-2"></div>

    <!-- Top navigation bar -->
    <nav class="topbar">
        <div class="topbar-brand">
            <div class="topbar-logo">🔐</div>
            <span class="topbar-name">Check<span>MyCH</span></span>
        </div>
        <div class="topbar-right">
            <!-- Live status merged into topbar -->
            <div class="topbar-status">
                <div class="status-dot"></div>
                <span>Database Connected</span>
                <span class="status-divider">·</span>
                <span class="status-live">Live</span>
            </div>
            <!-- Dark/Light mode toggle -->
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle light/dark mode" title="Toggle light/dark mode">
                <span class="theme-icon theme-icon-dark">🌙</span>
                <span class="theme-icon theme-icon-light">☀️</span>
            </button>
        </div>
    </nav>

    <!-- Main content -->
    <main class="main">
        <!-- Hero -->
        <div class="hero">
            <div class="hero-eyebrow">Field Visit Verification System</div>
            <h1></h1>SBC ACCOUNT CHECKER</h1>
            <p class="hero-sub">Search the database to verify whether an account is eligible for field visit.</p>
        </div>

        <!-- Search panel -->
        <div class="search-panel">
            <div class="search-field">
                <span class="search-field-icon">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                    </svg>
                </span>
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search by name, CH code, or amount..."
                    autocomplete="off"
                    autocorrect="off"
                    spellcheck="false"
                    aria-label="Search term"
                />
                <button id="searchBtn" onclick="performSearch()" aria-label="Run search">
                    <span class="btn-icon">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                        </svg>
                    </span>
                    <span>Search</span>
                </button>
            </div>
        </div>

        <!-- Results area -->
        <div class="results-area">
            <div id="loading" class="loading">
                <div class="loading-inner">
                    <div class="loader-ring"></div>
                    <p class="loading-text">Querying database</p>
                </div>
            </div>
            <div id="result"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-tip">
            Press <kbd>Enter</kbd> to search quickly
        </div>
        <span class="footer-copy">Field Visit Verification Portal</span>
    </footer>

    <script src="script.js"></script>
</body>
</html>
