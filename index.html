<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Search System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Account Search</h1>
            <p>Search by name, code, or any detail</p>
        </div>
        
        <div class="search-box">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Search name, code, or amount..."
                autocomplete="off"
            />
            <button onclick="performSearch()" id="searchBtn">
                <span>Search</span>
            </button>
        </div>
        
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Searching database...</p>
        </div>
        
        <div id="result"></div>
        
        <div class="footer">
            <p>💡 Tip: You can search by name, code (e.g., 02SBCCAC2604), or amount</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
